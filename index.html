    <script>
      (function () {
        var theme = "dark";
        try {
          theme = localStorage.getItem("theme") || "dark";
        } catch (e) {}
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.backgroundColor =
          theme === "light" ? "#f5f6f8" : "#0b0e14";
      })();
    </script>
